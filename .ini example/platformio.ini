; PlatformIO Project Configuration File

[env:esp32c6]
; Use the latest platform-espressif32 from GitHub, which includes support for ESP32-C6
platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.20/platform-espressif32.zip
board = esp32-c6-devkitc-1
framework = arduino

monitor_speed = 115200

;use this if you want to use the same USB port for both programming and serial monitor
build_flags = 
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1